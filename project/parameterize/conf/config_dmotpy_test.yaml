name: dmotpy_test

mode: train_test  # train, test, train_test
seed: 42
device: cuda
gpu_id: 0

data_loader: HydroLoader
data_sampler: HydroSampler

output_dir: ./outputs/${model.phy.name[0]}_${model.nn.name}_seed${seed}/
model_dir: ${output_dir}model/
plot_dir: ${output_dir}plot/
sim_dir: ${output_dir}sim/

data:
  basin_ids_path: ./data/531sub_id.txt
  basin_ids_reference_path: ./data/gage_id.npy

train:
  start_time: 1989/01/01
  end_time: 1998/12/31
  target: [streamflow]
  amp: false
  optimizer:
    name: Adam
  lr: 1e-3
  lr_scheduler:
    name: CosineAnnealingLR
    T_max: 100
    eta_min: 1e-5
  loss_function:
    name: KgeBatchLoss
  batch_size: 100
  epochs: 100
  start_epoch: 0
  save_epoch: 10

test:
  start_time: 1999/01/01
  end_time: 2009/12/31
  batch_size: 25
  test_epoch: 100
  mc_dropout: true
  mc_samples: 100
  mc_selection_metric: mse

sim:
  start_time: 1989/01/01
  end_time: 2009/12/31
  batch_size: 25

observations:
  name: camels_671
  data_path: ./data/camels_dataset
  start_time: 1980/10/01
  end_time: 2014/09/30
  area_name: area_gages2
  all_forcings: [prcp, tmean, pet]
  all_attributes: [
    p_mean, pet_mean, p_seasonality, frac_snow, aridity,
    high_prec_freq, high_prec_dur, low_prec_freq, low_prec_dur,
    elev_mean, slope_mean, area_gages2,
    frac_forest, lai_max, lai_diff, gvf_max, gvf_diff,
    dom_land_cover_frac, dom_land_cover, root_depth_50,
    soil_depth_pelletier, soil_depth_statsgo, soil_porosity,
    soil_conductivity, max_water_content,
    sand_frac, silt_frac, clay_frac,
    geol_1st_class, glim_1st_class_frac,
    geol_2nd_class, glim_2nd_class_frac,
    carbonate_rocks_frac, geol_porosity, geol_permeability,
  ]

model:
  rho: 365
  warm_up: 365
  output_unit: mm/d

  phy:
    name: [hbv96]  # any model from dmotpy.models.core.PARAM_INFO
    model_name: hbv96  # keep for dmotpy
    dynamic_params:
      hbv96: []
    nmul: 1
    warm_up_states: True
    routing: True
    nearzero: 1e-5
    forcings: [prcp, tmean, pet]
    attributes: []

  nn:
    name: Calibrate  # Calibrate or Parameterize
    # Calibrate specific parameters
    num_basins: 531  # number of basins in dataset
    num_start: 10    # number of initialization samples
    init_strategy: lhs_logit  # initialization strategy
    # Parameterize specific parameters
    hidden_size: 128
    hidden_layers: 2
    dropout: 0.4
    output_activation: sigmoid
    static_pool: last
    grid_min: -2.0
    grid_max: 2.0
    num_grids: 8
    use_base_update: true
    spline_weight_init_scale: 0.1
    forcings: []
    attributes: [
      p_mean, pet_mean, p_seasonality, frac_snow, aridity,
      high_prec_freq, high_prec_dur, low_prec_freq, low_prec_dur,
      elev_mean, slope_mean, area_gages2,
      frac_forest, lai_max, lai_diff, gvf_max, gvf_diff,
      dom_land_cover_frac, dom_land_cover, root_depth_50,
      soil_depth_pelletier, soil_depth_statsgo, soil_porosity,
      soil_conductivity, max_water_content,
      sand_frac, silt_frac, clay_frac,
      geol_1st_class, glim_1st_class_frac,
      geol_2nd_class, glim_2nd_class_frac,
      carbonate_rocks_frac, geol_porosity, geol_permeability,
    ]
