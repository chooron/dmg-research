# This configuration file is specifically for the differentiable hydrologic model dHBV 1.1p from Song et al. (2025). If you find this code is useful to your work, please cite the paper below:
# Yalan Song, Kamlesh Sawadekar, Jonathan Frame, et al. "Physics-informed, Differentiable Hydrologic  Models for Capturing Unseen Extreme Events." ESS Open Archive (2025). https://doi.org/10.22541/essoar.172304428.82707157/v2.

# This config replicates the CAMELS 531-basin, 10-year benchmark. 
defaults:
    - _self_
    - hydra: settings
    - observations: camels_531
## General -------------------------------#
mode: train  # train, test, train_test, simulation
random_seed: 42
seed: ${random_seed}
paper:
  variant: dhbv_pub_hopev1
device: cuda
gpu_id: 0

data_loader: HydroLoader
data_sampler: PubSampler
trainer: PubTrainer


output_dir: ./outputs/${paper.variant}-531/${train.loss_function.name}/seed_${seed}/
model_dir: ${output_dir}model/
plot_dir: ${output_dir}plot/
sim_dir: ${output_dir}sim/



## Training ------------------------------#
train:
    start_time: 1989/10/01
    end_time: 1999/09/30
    target: [streamflow]
    loss_function:
      name: NseBatchLoss
    optimizer: Adadelta
    batch_size: 100
    epochs: 50
    start_epoch: 0
    save_epoch: 5


## Evaluation -------------------------------#
test:
    start_time: 1989/10/01
    end_time: 1999/09/30
    batch_size: 25
    test_epoch: 50
    test_group_id: 6 # change pub id 7 14 没跑
    split_dataset: True

## Inference -------------------------------#
simulation:
    start_time: 2012/10/01
    end_time: 2014/09/30
    batch_size: 25


## Loss Function -------------------------#
loss_function:
    model: NseBatchLoss


## Differentiable Model -----------------------------#
delta_model:
    rho: 365
    
    phy_model:
        ## Citations ##
        # HBV 1.1p: Yalan Song, Kamlesh Sawadekar, Jonathan Frame, et al.
        # "Physics-informed, Differentiable Hydrologic  Models for Capturing
        # Unseen Extreme Events." ESS Open Archive (2025).
        # https://doi.org/10.22541/essoar.172304428.82707157/v2.

        model: [Hbv_2]
        nmul: 16
        warm_up: 365
        warm_up_states: False
        dy_drop: 0.0
        dynamic_params:
            Hbv_2: [parBETA, parK0, parBETAET]

        routing: True
        use_log_norm: []
        nearzero: 1e-5

        forcings: [
            prcp,
            tmean,
            pet,
        ]
        attributes: []

    nn_model:
        model: HopeMlpV1
        mlp_dropout: 0.5
        hope_dropout: 0.2
        hope_hidden_size: 256
        mlp_hidden_size: 256
        learning_rate: 1.0
        lr_scheduler: None
        lr_scheduler_params:
            step_size: 10
            gamma: 0.5
        
        forcings: [
            prcp,
            tmean,
            pet,
        ]
        attributes: [
            p_mean,
            pet_mean,
            p_seasonality,
            frac_snow,
            aridity,
            high_prec_freq,
            high_prec_dur,
            low_prec_freq,
            low_prec_dur,
            elev_mean,
            slope_mean,
            area_gages2,
            frac_forest,
            lai_max,
            lai_diff,
            gvf_max,
            gvf_diff,
            dom_land_cover_frac,
            dom_land_cover,
            root_depth_50,
            soil_depth_pelletier,
            soil_depth_statsgo,
            soil_porosity,
            soil_conductivity,
            max_water_content,
            sand_frac,
            silt_frac,
            clay_frac,
            geol_1st_class,
            glim_1st_class_frac,
            geol_2nd_class,
            glim_2nd_class_frac,
            carbonate_rocks_frac,
            geol_porosity,
            geol_permeability,
        ]
