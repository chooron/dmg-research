name: camels_dhbv_vrex

mode: train_test  # train, test, train_test

seed: 111111
device: cuda
gpu_id: 0

data_loader: HydroLoader
data_sampler: HydroSampler
trainer: CausalTrainer

output_dir: ./outputs/vrex_dhbv_held_out_${causal.holdout_cluster}_seed${seed}/
model_dir: ${output_dir}model/
plot_dir: ${output_dir}plot/
sim_dir: ${output_dir}sim/


## Training --------------------------#
train:
  start_time: 1989/10/01
  end_time: 1999/09/30
  target: [streamflow]
  amp: false
  optimizer:
    name: Adam
  lr: 1e-3
  lr_scheduler:
    name: CosineAnnealingLR
    T_max: 100
    eta_min: 1e-5
  loss_function:
    name: VRExKgeBatchLoss
  batch_size: 100
  epochs: 100
  start_epoch: 0
  save_epoch: 10


## Test ------------------------------#
test:
  start_time: 1989/10/01
  end_time: 1999/09/30
  batch_size: 25
  test_epoch: 100


## Simulation ------------------------#
sim:
  start_time: 1980/10/01
  end_time: 2014/09/30
  batch_size: 25


## Causal / VREx ---------------------#
causal:
  cluster_csv: ./data/gauge_cluster.csv
  basin_ids_path: ./data/gage_id.npy
  holdout_cluster: A

lambda_vrex: 100.0
vrex_warmup_epochs: 10


## Observations ----------------------#
observations:
  name: camels_671
  data_path: ./data/camels_dataset
  start_time: 1980/10/01
  end_time: 2014/09/30
  area_name: area_gages2
  all_forcings: [prcp, tmean, pet]
  all_attributes: [
    p_mean, pet_mean, p_seasonality, frac_snow, aridity,
    high_prec_freq, high_prec_dur, low_prec_freq, low_prec_dur,
    elev_mean, slope_mean, area_gages2,
    frac_forest, lai_max, lai_diff, gvf_max, gvf_diff,
    dom_land_cover_frac, dom_land_cover, root_depth_50,
    soil_depth_pelletier, soil_depth_statsgo, soil_porosity,
    soil_conductivity, max_water_content,
    sand_frac, silt_frac, clay_frac,
    geol_1st_class, glim_1st_class_frac,
    geol_2nd_class, glim_2nd_class_frac,
    carbonate_rocks_frac, geol_porosity, geol_permeability,
  ]


## Model -----------------------------#
model:
  rho: 365
  warm_up: 365
  output_unit: mm/d

  phy:
    name: [HbvStatic]
    dynamic_params:
      HbvStatic: []
    nmul: 16
    warm_up_states: True
    routing: True
    nearzero: 1e-5
    forcings: [prcp, tmean, pet]
    attributes: []

  nn:
    name: AnnModel
    dropout: 0.4
    hidden_size: 256
    forcings: [prcp, tmean, pet]
    attributes: [
      p_mean, pet_mean, p_seasonality, frac_snow, aridity,
      high_prec_freq, high_prec_dur, low_prec_freq, low_prec_dur,
      elev_mean, slope_mean, area_gages2,
      frac_forest, lai_max, lai_diff, gvf_max, gvf_diff,
      dom_land_cover_frac, dom_land_cover, root_depth_50,
      soil_depth_pelletier, soil_depth_statsgo, soil_porosity,
      soil_conductivity, max_water_content,
      sand_frac, silt_frac, clay_frac,
      geol_1st_class, glim_1st_class_frac,
      geol_2nd_class, glim_2nd_class_frac,
      carbonate_rocks_frac, geol_porosity, geol_permeability,
    ]
