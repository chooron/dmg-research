name: camels_dhbv_irm

mode: train_test  # train, test, train_test

seed: 111111
device: cuda
gpu_id: 0

data_loader: HydroLoader
data_sampler: HydroSampler
trainer: CausalTrainer

model_dir: ./outputs/causal_dhbv_group${causal.holdout_group}/


## Training (训练流域 K-1 群) ----------#
train:
  start_time: 1980/10/01
  end_time: 2010/09/30
  target: [streamflow]
  optimizer:
    name: Adam
  lr: 1e-3
  lr_scheduler:
    name: CosineAnnealingLR
    T_max: 100        # = epochs, one full cosine cycle
    eta_min: 1e-5
  loss_function:
    name: IRMKgeBatchLoss
  batch_size: 100
  epochs: 100
  start_epoch: 0
  save_epoch: 10


## Test (留出群全段评估 PUB) -----------#
test:
  start_time: 1980/10/01
  end_time: 2010/09/30
  batch_size: 25
  test_epoch: 100


## Simulation -------------------------#
sim:
  start_time: 1980/10/01
  end_time: 2014/09/30
  batch_size: 25


## Causal / IRM ----------------------#
causal:
  cluster_csv: ./data/gauge_cluster.csv
  basin_ids_path: ./data/gage_id.npy
  use_groups: True        # True=4 coarse groups (primary), False=10 fine clusters
  holdout_group: 1        # group to hold out as OOD test (1-4)

lambda_irm: 100.0
irm_warmup_epochs: 10


## Observations ----------------------#
observations:
  name: camels_671
  data_path: ./data/camels_dataset
  start_time: 1980/10/01
  end_time: 2014/09/30
  area_name: area_gages2
  all_forcings: [prcp, tmean, pet]
  all_attributes: [
    p_mean, pet_mean, p_seasonality, frac_snow, aridity,
    high_prec_freq, high_prec_dur, low_prec_freq, low_prec_dur,
    elev_mean, slope_mean, area_gages2,
    frac_forest, lai_max, lai_diff, gvf_max, gvf_diff,
    dom_land_cover_frac, dom_land_cover, root_depth_50,
    soil_depth_pelletier, soil_depth_statsgo, soil_porosity,
    soil_conductivity, max_water_content,
    sand_frac, silt_frac, clay_frac,
    geol_1st_class, glim_1st_class_frac,
    geol_2nd_class, glim_2nd_class_frac,
    carbonate_rocks_frac, geol_porosity, geol_permeability,
  ]


## Model -----------------------------#
model:
  rho: 365
  warm_up: 365
  output_unit: mm/d

  phy:
    name: [HbvStatic]
    dynamic_params:
      HbvStatic: []
    nmul: 16
    warm_up_states: True
    routing: True
    nearzero: 1e-5
    forcings: [prcp, tmean, pet]
    attributes: []

  nn:
    name: AnnModel
    dropout: 0.4
    hidden_size: 256
    forcings: [prcp, tmean, pet]
    attributes: [
      p_mean, pet_mean, p_seasonality, frac_snow, aridity,
      high_prec_freq, high_prec_dur, low_prec_freq, low_prec_dur,
      elev_mean, slope_mean, area_gages2,
      frac_forest, lai_max, lai_diff, gvf_max, gvf_diff,
      dom_land_cover_frac, dom_land_cover, root_depth_50,
      soil_depth_pelletier, soil_depth_statsgo, soil_porosity,
      soil_conductivity, max_water_content,
      sand_frac, silt_frac, clay_frac,
      geol_1st_class, glim_1st_class_frac,
      geol_2nd_class, glim_2nd_class_frac,
      carbonate_rocks_frac, geol_porosity, geol_permeability,
    ]
